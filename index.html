<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zablon POL Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { ethers } from "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.min.js";
        window.ethers = ethers;
    </script>
    <style>
        body { background: #050508; color: white; font-family: sans-serif; padding: 20px; }
        .glass { background: rgba(147, 51, 234, 0.05); border: 1px solid rgba(147, 51, 234, 0.2); backdrop-filter: blur(10px); }
        .active-tab { color: #9333ea; border-bottom: 2px solid #9333ea; }
    </style>
</head>
<body class="flex flex-col items-center">
    <div class="max-w-md w-full space-y-6">
        <header class="flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-purple-500 uppercase">Zablon<span class="text-white">POL</span></h1>
            <div id="status" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_red]"></div>
        </header>

        <div class="glass rounded-3xl p-6">
            <div class="flex justify-between items-center mb-4 text-[10px] font-bold text-gray-500">
                <p>POL PERFORMANCE</p>
                <div class="flex gap-3">
                    <button onclick="updateStats('Daily')" id="t-Daily" class="active-tab">D</button>
                    <button onclick="updateStats('Weekly')" id="t-Weekly">W</button>
                    <button onclick="updateStats('Monthly')" id="t-Monthly">M</button>
                </div>
            </div>
            <div class="flex items-baseline gap-2">
                <h2 id="profit-val" class="text-4xl font-black text-purple-400 mb-4">0.00</h2>
                <span class="text-gray-500 font-bold">POL</span>
            </div>
            <canvas id="chart" height="100"></canvas>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <div class="glass p-5 rounded-2xl flex justify-between items-center">
                <p class="text-xs text-gray-400 font-bold uppercase">Bot POL Profit</p>
                <p id="pol-bal" class="text-xl font-mono text-purple-300">0.00</p>
            </div>
        </div>

        <div class="space-y-3">
            <button onclick="claimProfit()" class="w-full py-4 bg-purple-600 text-white font-black rounded-2xl text-xs uppercase tracking-widest shadow-lg">Claim POL to Wallet</button>
            <button onclick="pushToBinance()" class="w-full py-4 bg-white text-black font-black rounded-2xl text-xs uppercase tracking-widest hover:bg-gray-200">Push to Binance POL</button>
        </div>

        <div id="log" class="bg-black/50 p-4 rounded-xl h-24 overflow-y-auto text-[10px] font-mono text-gray-500 border border-purple-900/20">
            > initialization: complete<br>> asset: WPOL
        </div>
        
        <button id="btnConn" onclick="connect()" class="w-full py-4 bg-purple-900/30 border border-purple-500 text-purple-500 font-black rounded-2xl uppercase">Connect Controller</button>
    </div>

    <script>
        const BINANCE_ADDR = "0xcba4b6ccb70a4973096ed46b613160e6f7c42a95"; 
        const WPOL_ADDR = "0x0d500B1d8E8eF31E21C99d1Db9A6444d3ADf1270";
        let CONTRACT_ADDR = "PASTE_YOUR_CONTRACT_ADDRESS_HERE"; 

        let provider, signer, chart;
        const mock = { Daily: [100, 250, 180, 420], Weekly: [800, 1200, 1100, 1800], Monthly: [4000, 6000, 5500, 8500] };

        async function connect() {
            if(!window.ethereum) return alert("Open in MetaMask");
            provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            document.getElementById('btnConn').style.display='none';
            document.getElementById('status').style.background = "#a855f7";
            initChart();
            addLog("Linked to Wallet.");
            updateStats('Daily');
        }

        function initChart() {
            chart = new Chart(document.getElementById('chart'), {
                type: 'line', data: { labels: ['','','',''], datasets: [{ data: mock.Daily, borderColor: '#a855f7', tension:0.4, pointRadius:0 }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        function updateStats(p) {
            document.querySelectorAll('button[id^="t-"]').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('t-'+p).classList.add('active-tab');
            chart.data.datasets[0].data = mock[p];
            document.getElementById('profit-val').innerText = mock[p][3].toLocaleString();
            chart.update();
        }

        async function claimProfit() {
            try {
                const bot = new ethers.Contract(CONTRACT_ADDR, ["function withdraw(address) external"], signer);
                addLog("Withdrawing WPOL...");
                const tx = await bot.withdraw(WPOL_ADDR);
                await tx.wait();
                addLog("POL now in your wallet.");
            } catch (e) { addLog("Error: Bot has no profit yet."); }
        }

        async function pushToBinance() {
            try {
                const bal = await provider.getBalance(await signer.getAddress());
                const amountToSend = bal - ethers.parseEther("0.5"); // Keep 0.5 POL for next transaction gas
                if(amountToSend <= 0) return addLog("Wallet low on gas. Keep 0.5 POL.");
                
                const tx = await signer.sendTransaction({
                    to: BINANCE_ADDR,
                    value: amountToSend
                });
                addLog("Moving POL to Binance...");
                await tx.wait();
                addLog("POL sent to Binance!");
            } catch (e) { addLog("Push failed."); }
        }

        function addLog(m) {
            const l = document.getElementById("log");
            l.innerHTML = `> ${m}<br>` + l.innerHTML;
        }
    </script>
</body>
</html>
