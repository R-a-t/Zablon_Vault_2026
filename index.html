<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zablon POL Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { ethers } from "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.min.js";
        window.ethers = ethers;
    </script>
    <style>
        body { background: #0a0a0f; color: #e2e8f0; font-family: 'Inter', sans-serif; padding: 15px; }
        .card { background: rgba(30, 30, 45, 0.6); border: 1px solid rgba(139, 92, 246, 0.2); backdrop-filter: blur(12px); border-radius: 24px; }
        .btn-toggle { padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; transition: 0.2s; border: 1px solid transparent; }
        .btn-toggle.active { background: #8b5cf6; color: white; box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }
        .glow-purple { text-shadow: 0 0 15px rgba(167, 139, 250, 0.6); }
    </style>
</head>
<body class="flex flex-col items-center">
    <div class="max-w-md w-full space-y-5">
        
        <div class="flex justify-between items-center px-2">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-purple-500 uppercase">Zablon <span class="text-white">v2.6</span></h1>
                <p class="text-[9px] font-bold text-gray-500 tracking-widest uppercase">POL Ecosystem Node</p>
            </div>
            <div id="connection-dot" class="w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse"></div>
        </div>

        <div class="card p-6 border-t-2 border-purple-500/50">
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Contract POL Balance</p>
            <div class="flex items-baseline gap-2">
                <span id="live-bal" class="text-5xl font-black text-white glow-purple">0.00</span>
                <span class="text-sm font-bold text-purple-400">POL</span>
            </div>
            <div class="mt-2 text-[10px] text-gray-500 font-mono italic" id="usd-val">≈ $0.00 USD</div>
        </div>

        <div class="card p-5">
            <div class="flex justify-between items-center mb-6">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Performance History</p>
                <div class="flex gap-1 bg-black/40 p-1 rounded-14">
                    <button onclick="changeView('Daily')" id="btn-Daily" class="btn-toggle active">24H</button>
                    <button onclick="changeView('Weekly')" id="btn-Weekly" class="btn-toggle">7D</button>
                    <button onclick="changeView('Monthly')" id="btn-Monthly" class="btn-toggle">30D</button>
                </div>
            </div>
            
            <div class="h-32 w-full">
                <canvas id="performanceChart"></canvas>
            </div>

            <div class="flex justify-between mt-4 px-1">
                <div>
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Estimated Yield</p>
                    <p id="yield-val" class="text-lg font-bold text-green-400">+142 POL</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Network Status</p>
                    <p class="text-lg font-bold text-purple-400">Optimized</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-3">
            <button onclick="claimToWallet()" class="w-full py-4 bg-white text-black font-black rounded-2xl text-xs uppercase tracking-widest hover:scale-[1.02] active:scale-95 transition-all">
                Withdraw Profit to Wallet
            </button>
            <button onclick="pushToBinance()" class="w-full py-4 bg-purple-600/10 border border-purple-500/30 text-purple-400 font-black rounded-2xl text-xs uppercase tracking-widest hover:bg-purple-600/20 transition-all">
                Instant Push to Binance
            </button>
        </div>

        <div id="terminal" class="bg-black/80 rounded-2xl p-4 h-28 overflow-y-auto text-[10px] font-mono text-purple-300/60 border border-white/5">
            > system_reboot: success<br>> network: polygon_pos<br>> awaiting_operator...
        </div>

        <button id="connectBtn" onclick="init()" class="w-full py-4 bg-purple-600 text-white font-black rounded-2xl shadow-lg shadow-purple-500/20">LINK FLASH NODE</button>

    </div>

    <script>
        const BINANCE_ADDR = "0xcba4b6ccb70a4973096ed46b613160e6f7c42a95";
        let CONTRACT_ADDR = "0x0000000000000000000000000000000000000000"; // PASTE AFTER DEPLOY
        const POL_PRICE = 0.09; // Fixed for current April 2026 estimate

        let provider, signer, chart;

        const dataHistory = {
            Daily: { points: [12, 45, 32, 88, 142], yield: "+142 POL" },
            Weekly: { points: [400, 850, 600, 1100, 950, 1400, 1280], yield: "+1,280 POL" },
            Monthly: { points: [2000, 4500, 3800, 6200, 5100, 7800], yield: "+7,800 POL" }
        };

        async function init() {
            if (!window.ethereum) return alert("Please use MetaMask Browser");
            provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('connection-dot').classList.replace('bg-red-600', 'bg-green-500');
            
            setupChart();
            updateLiveBalance();
            setInterval(updateLiveBalance, 15000);
            log("Node Connected. Ready for Flash Loans.");
        }

        async function updateLiveBalance() {
            try {
                const balRaw = await provider.getBalance(CONTRACT_ADDR);
                const balFormatted = ethers.formatEther(balRaw);
                const shortBal = parseFloat(balFormatted).toFixed(2);
                
                document.getElementById('live-bal').innerText = shortBal;
                document.getElementById('usd-val').innerText = `≈ $${(shortBal * POL_PRICE).toFixed(2)} USD`;
            } catch(e) {
                log("Error fetching contract balance.");
            }
        }

        function setupChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['', '', '', '', '', ''],
                    datasets: [{
                        data: dataHistory.Daily.points,
                        borderColor: '#8b5cf6',
                        borderWidth: 3,
                        tension: 0.4,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(139, 92, 246, 0.1)'
                    }]
                },
                options: { plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        function changeView(period) {
            document.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + period).classList.add('active');
            
            chart.data.datasets[0].data = dataHistory[period].points;
            document.getElementById('yield-val').innerText = dataHistory[period].yield;
            chart.update();
            log(`View switched to ${period} performance.`);
        }

        async function claimToWallet() {
            log("Requesting withdrawal from contract...");
            // Add contract call logic here
        }

        async function pushToBinance() {
            log("Initiating POL transfer to Binance...");
            // Add transfer logic here
        }

        function log(m) {
            const t = document.getElementById('terminal');
            t.innerHTML = `> ${m}<br>` + t.innerHTML;
        }
    </script>
</body>
</html>
