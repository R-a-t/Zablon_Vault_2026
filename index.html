<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zablon POL Node | Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { ethers } from "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.min.js";
        window.ethers = ethers;
    </script>
    <style>
        body { background: #0a0a0f; color: #e2e8f0; font-family: 'Inter', sans-serif; padding: 20px; }
        .card { background: rgba(30, 30, 45, 0.6); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 24px; backdrop-filter: blur(10px); }
        .btn-toggle.active { background: #8b5cf6; color: white; box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }
        .glitch-text { text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
        #log::-webkit-scrollbar { width: 4px; }
        #log::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div class="max-w-md w-full space-y-6">
        
        <div class="flex justify-between items-end px-2">
            <div>
                <h1 class="text-2xl font-black text-purple-500 uppercase leading-none italic glitch-text">Zablon</h1>
                <p class="text-[10px] font-bold text-gray-500 tracking-[0.3em] uppercase">POL Native Node v2.6</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] bg-green-500/10 text-green-500 px-2 py-1 rounded-md font-bold">● SYSTEM ONLINE</span>
            </div>
        </div>

        <div class="card p-8 border-t-4 border-purple-500 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="white"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
            </div>
            <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-2">Protected Profit (WPOL)</p>
            <div class="flex items-baseline gap-2">
                <h2 id="live-bal" class="text-6xl font-black text-white tracking-tighter">0.00</h2>
                <span class="text-purple-500 font-bold">POL</span>
            </div>
            <p id="usd-val" class="text-sm text-gray-500 mt-1 font-medium">≈ $0.00 USD</p>
        </div>

        <div class="card p-6">
            <div class="flex justify-between items-center mb-6">
                <p class="text-[11px] font-black text-gray-400 tracking-tighter uppercase">Performance Metrics</p>
                <div class="flex gap-1 bg-black/40 p-1 rounded-xl">
                    <button onclick="updateView('Daily')" id="btn-Daily" class="btn-toggle active px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all">24H</button>
                    <button onclick="updateView('Weekly')" id="btn-Weekly" class="btn-toggle px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all">7D</button>
                    <button onclick="updateView('Monthly')" id="btn-Monthly" class="btn-toggle px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all">30D</button>
                </div>
            </div>
            <canvas id="perfChart" height="140"></canvas>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="claimProfit()" class="py-5 bg-purple-600 hover:bg-purple-500 text-white font-black rounded-2xl transition-all active:scale-95 shadow-lg shadow-purple-900/20">
                WITHDRAW WPOL
            </button>
            <button onclick="pushToBinance()" class="py-5 bg-white hover:bg-gray-200 text-black font-black rounded-2xl transition-all active:scale-95">
                PUSH TO BINANCE
            </button>
        </div>

        <div class="card bg-black/40 border-none p-4">
            <div id="log" class="text-[10px] font-mono text-gray-400 h-28 overflow-y-auto space-y-1">
                <div class="text-purple-400">> [SYSTEM] Booting Zablon POL-Native Engine...</div>
                <div class="text-gray-600">> [ASSETS] WETH, WBTC, LINK, USDC Loaded.</div>
                <div class="text-gray-600">> [SHIELD] Gas Protection Active: Min 1.0 POL.</div>
            </div>
        </div>
    </div>

    <script>
        const BINANCE_ADDR = "0xcba4b6ccb70a4973096ed46b613160e6f7c42a95";
        const WPOL_ADDR = "0x0d500B1d8E8eF31E21C99d1Db9A6444d3ADf1270";
        let CONTRACT_ADDR = "PASTE_YOUR_CONTRACT_ADDRESS_HERE";
        
        let provider, signer, botContract;
        const POL_PRICE = 0.091; // April 2026 Price Estimate

        function log(msg, color = "gray-400") {
            const l = document.getElementById('log');
            l.innerHTML += `<div class="text-${color}">> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function init() {
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                botContract = new ethers.Contract(CONTRACT_ADDR, [
                    "function withdraw(address) external",
                    "function ensureGas() external"
                ], signer);
                refreshData();
                setInterval(refreshData, 10000);
            }
        }

        async function refreshData() {
            try {
                // We check WPOL (Profit) balance specifically
                const wpolContract = new ethers.Contract(WPOL_ADDR, ["function balanceOf(address) view returns (uint256)"], provider);
                const balance = await wpolContract.balanceOf(CONTRACT_ADDR);
                const formatted = parseFloat(ethers.formatEther(balance)).toFixed(2);
                
                document.getElementById('live-bal').innerText = formatted;
                document.getElementById('usd-val').innerText = `≈ $${(formatted * POL_PRICE).toFixed(2)} USD`;
            } catch (e) { console.error("Update failed"); }
        }

        async function claimProfit() {
            log("Shielding profits... Initiating WPOL withdrawal", "purple-400");
            try {
                const tx = await botContract.withdraw(WPOL_ADDR);
                log(`Transaction Sent: ${tx.hash.substring(0,10)}...`, "gray-500");
                await tx.wait();
                log("✅ Profits secured in wallet.", "green-500");
            } catch (e) { log("❌ Withdrawal failed or no balance.", "red-500"); }
        }

        async function pushToBinance() {
            log("Initiating External Push to Binance...", "white");
            // Add custom transfer logic here
        }

        // Performance Chart Initialization
        const ctx = document.getElementById('perfChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'],
                datasets: [{
                    data: [12, 19, 15, 25, 22, 30],
                    borderColor: '#8b5cf6',
                    borderWidth: 3,
                    tension: 0.4,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(139, 92, 246, 0.1)'
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });

        window.onload = init;
    </script>
</body>
</html>
